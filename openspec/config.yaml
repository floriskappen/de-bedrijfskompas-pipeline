schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
context: |
  Project: de-bedrijfskompas pipeline
  Stack: Python

  I use conventional commits

  Final pipeline output: Produce a dataset that can be used to build the static front-end.
  Purpose: Company-first discovery pipeline for employers: scrape, extract, and de-marketing-ify company website data so job seekers can evaluate companies on substance rather than vacancies. See CONSTITUTION.md for full principles
  Test-set: Companies from the test set (test-set/companies.json) can be used to test if wanted.

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
rules:
  proposal:
    - State what stage(s) this change affects and why
  specs:
    - Define input and output shape explicitly, in whatever format the stage produces (JSON for most stages, markdown for content stages)
    - List edge cases the stage must handle, and which it explicitly does not
    - Write specs timelessly — describe the current state, not the change. MODIFIED requirements replace the canonical spec verbatim on archive, so avoid "subsumes/replaces/was formerly/remains/no longer" framing in requirement bodies and scenarios. History belongs in the proposal and git log, not the spec.

schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
context: |
  Project: de-bedrijfskompas pipeline
  Stack: Python

  I use conventional commits

  Final pipeline output: Produce a dataset that can be used to build the static front-end.
  Purpose: Company-first discovery pipeline for employers: scrape, extract, and de-marketing-ify company website data so job seekers can evaluate companies on substance rather than vacancies. See CONSTITUTION.md for full principles
  Test-set: Companies from the test set (test-set/companies.json) can be used to test if wanted.

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
rules:
  proposal:
    - State what stage(s) this change affects and why
    - Ideal length is ~15-50 lines. The shorter the better.
  specs:
    - Define input and output shape explicitly, in whatever format the stage produces (JSON for most stages, markdown for content stages)
    - List edge cases the stage must handle, and which it explicitly does not
    - Write specs timelessly — describe the current state, not the change. MODIFIED requirements replace the canonical spec verbatim on archive, so avoid "subsumes/replaces/was formerly/remains/no longer" framing in requirement bodies and scenarios. History belongs in the proposal and git log, not the spec.
    - Keep requirement bodies to one short paragraph. If a requirement needs more, it's probably two requirements, or you're explaining *why* — and rationale belongs in design.md.
    - One scenario per distinct observable behaviour. If two scenarios share their WHEN clause, merge them. Don't write a scenario whose only purpose is to restate a requirement bullet.
    - Length is a signal. Pipeline-stage specs typically land at 100–200 lines; 200–350 needs a cross-stage-contract or expensive-rework justification; above 400 is almost always accidental bloat (prose to delete, scenarios to merge, rationale to move to design.md). Per OpenSpec defaults, most specs stay in Lite mode (a few scenarios per requirement); Full-mode size is only earned when ambiguity would cost real rework.
    - Name load-bearing constants and vocabularies (tier lists, thresholds, fixed slug sets) but don't justify them inline — the values belong in the spec so a re-implementer can reproduce behaviour; the rationale belongs in design.md.
    - Include an "Operational Pitfalls" section only for non-obvious environmental or library hazards that would silently break a re-implementation (e.g. module-level state across calls, namespace-prefix fragility). Don't enumerate every defensive patch; the test suite carries the regression coverage.
  design:
    - Keep design.md focused on rationale and trade-offs, not load-bearing data. If a list, constant, or vocabulary is required for correct behaviour, move it into specs/.
    - Each architectural decision is maybe 5-10 lines -- what was chosen, what alternatives were considered, why this one. For a typical pipeline stage you'll have 3-6 decisions. Resist the agent's tendency to over-elaborate here.
    - Ideal length is ~40-80 lines.
  tasks:
    - Treat tests as a first-class deliverable, not an afterthought. Each `#### Scenario:` in the spec should map to at least one named test in the task list; reference the test name explicitly so coverage is auditable.
